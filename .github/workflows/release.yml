name: 发布插件

on:
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本号，例如 1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验版本号
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "非法版本号: $VERSION"
            exit 1
          fi
          if git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "标签 v$VERSION 已存在"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: 构建插件
        run: ./gradlew clean build --no-daemon -PpluginVersion=${{ steps.version.outputs.value }}

      - name: 创建 Git 标签
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: build/libs/worldgit-${{ steps.version.outputs.value }}.jar
