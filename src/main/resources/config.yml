display-prefix: "WorldGit"
main-world: "world"
max-region-size-x: 50
max-region-size-z: 50
use-full-height: false
max-active-branches: 2
max-queue-entries: 1

backup:
  enabled: true
  interval-minutes: 30
  max-backups: 10
  directory: "backups"

branch-world:
  directory: "branch"
  prefix: "wg_"

database:
  file: "worldgit.db"

web:
  enabled: true
  host: "0.0.0.0"
  port: 80
  static-directory: "web"
  recent-limit: 20
  # BlueMap 页面地址。可填完整 URL，如 "http://127.0.0.1:8100/"，
  # 也可填反向代理后的路径，如 "/bluemap/"。
  bluemap-url: ""
